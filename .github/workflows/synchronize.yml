name: Sync Parent Repo

on:
  push:
    branches:
      - main 

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: reihakuro/gps-tracker-main
          event-type: update-submodules
