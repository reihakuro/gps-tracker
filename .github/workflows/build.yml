name: Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Python setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: PlatformIO Core
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Compile
      run: pio run
